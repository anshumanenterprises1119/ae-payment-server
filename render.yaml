services:
  - type: web
    name: ae-payment-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    # ⚠️ DO NOT put credentials here — use Render Dashboard → Environment Variables
    # Required env vars to set in dashboard:
    #   PHONEPE_CLIENT_ID
    #   PHONEPE_CLIENT_SECRET
    #   PHONEPE_SANDBOX (true/false)
    #   PHONEPE_WEBHOOK_USERNAME
    #   PHONEPE_WEBHOOK_PASSWORD
    #   CALLBACK_URL (e.g. https://ae-payment-server.onrender.com/callback)
    #   SUCCESS_URL
    #   FAILURE_URL
    #   PORT
